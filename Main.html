<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Exclusive Collection</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-red: #d32f2f;
            --neon-glow: #ff4d4d;
            --text-light: #ffffff;
            --text-gray: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* SCREEN 1: THE EGG CHOICE */
        #egg-screen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 20px;
        }

        .egg-title {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .egg-container {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .egg {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            user-select: none;
            filter: drop-shadow(0 0 10px rgba(211, 47, 47, 0.5));
            position: relative; /* Container for hidden image */
        }

        .egg:hover {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 0 20px var(--neon-glow));
        }

        /* Hides image inside the egg until hatch */
        .egg-hidden-image {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; /* Reduced scale for inside egg */
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        /* SCREEN 2: THE SHOP (Hidden initially) */
        #shop-screen {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .shop-header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 20px;
        }

        .shop-header h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-red);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .shop-header p {
            color: var(--text-gray);
            margin-top: 10px;
            font-style: italic;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-red);
            box-shadow: 0 10px 20px rgba(211, 47, 47, 0.1);
        }

        .product-img-wrapper {
            width: 100%;
            height: 350px;
            overflow: hidden;
            background-color: #111;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .product-price {
            font-size: 1.4rem;
            color: var(--accent-red);
            font-weight: bold;
        }

        .add-to-cart-btn {
            margin-top: auto;
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .add-to-cart-btn:hover {
            background-color: #b71c1c;
        }

        .add-to-cart-btn:active {
            transform: scale(0.98);
        }

        /* POPUP MODAL FOR PUNCHLINE */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-red);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 30px var(--neon-glow);
        }

        .modal-content h2 {
            color: var(--accent-red);
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .modal-content p {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .close-btn {
            margin-top: 25px;
            background-color: transparent;
            border: 1px solid var(--text-gray);
            color: var(--text-gray);
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-btn:hover {
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

    <div id="egg-screen">
        <h1 class="egg-title">Pick an Egg to Begin</h1>
        <div class="egg-container">
            <div class="egg" id="hatch-egg" onclick="hatchEgg()">🥚
                <img src="boyfriend_hatched.png" alt="Hatched Pet" class="egg-hidden-image" id="hidden-hatched-img">
            </div>
            <div class="egg" onclick="openShop(this)">🥚</div>
        </div>
    </div>

    <div id="shop-screen">
        <header class="shop-header">
            <h1>The Premium Collection</h1>
            <p>High demand items. Limited availability.</p>
        </header>

        <main class="products-grid">
            <div class="product-card">
                <div class="product-img-wrapper">
                    <img src="goofy_sunshine.png" alt="Boyfriend Tier 1" class="product-img">
                </div>
                <div class="product-info">
                    <div class="product-title">"goofy ball of sunshine"</div>
                    <div class="product-price">$150,000.00</div>
                    <button class="add-to-cart-btn" onclick="triggerSoldOut()">add to cart 💗</button>
                </div>
            </div>
