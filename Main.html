<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Exclusive Collection</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #fce4ec;
            color: #4a148c;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .egg-zone {
            margin: 30px 0;
            padding: 20px;
            background: #fff0f5;
            border-radius: 15px;
        }
        .egg-btn {
            font-size: 3rem;
            background: none;
            border: 2px dashed #ffb6c1;
            cursor: pointer;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 50%;
            transition: transform 0.2s, background-color 0.2s;
        }
        .egg-btn:hover {
            transform: scale(1.1);
            background-color: #ffe4e1;
        }
        .egg-btn.active {
            border-color: #4a148c;
            background-color: #ffd1dc;
        }
        .grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .card {
            background: #fff;
            border: 1px solid #f8bbd0;
            border-radius: 15px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #eaeaea;
        }
        .price {
            font-weight: bold;
            color: #e91e63;
        }
        .btn {
            background-color: #ff85a2;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #ff6584;
        }
        .footer-note {
            margin-top: 40px;
            border-top: 2px dashed #f8bbd0;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>An Exclusive Collection</h1>
        
        <div class="egg-zone">
            <h2># Pick an Egg to Begin</h2>
            <button class="egg-btn active" onclick="switchEgg(1, this)">🥚 <span style="font-size: 1rem; display:block;">Egg 1</span></button>
            <button class="egg-btn" onclick="switchEgg(2, this)">🥚 <span style="font-size: 1rem; display:block;">Egg 2</span></button>
        </div>

        <h2 id="collection-title">The Premium Collection: Egg 1 Setup</h2>
        <p class="subtitle">High demand items. Limited availability over the exact same interface.</p>

        <div class="grid">
            <div class="card">
                <img id="img-left" src="your_boyfriend_1.jpg" alt="Premium Item Left">
                <h3 id="title-left">The "Absolute Cutest" Edition</h3>
                <p id="price-left" class="price">$999,999.99</p>
                <button class="btn">add to cart 💗</button>
            </div>

            <div class="card">
                <img id="img-right" src="your_boyfriend_2.jpg" alt="Premium Item Right">
                <h3 id="title-right">The "Extremely Fine" Premium</h3>
                <p id="price-right" class="price">$5,000,000.00</p>
                <button class="btn">add to cart 💗</button>
            </div>
        </div>
        
        <div class="footer-note">
            <h2>Sold Out!</h2>
            <p>Somebody's husband now 💗</p>
        </div>
    </div>

    <script>
        // Data configurations for both pages
        const eggData = {
            1: {
                title: "The Premium Collection: Egg 1 Setup",
                leftImg: "your_boyfriend_1.jpg",
                leftTitle: "The \"Absolute Cutest\" Edition",
                leftPrice: "$999,999.99",
                rightImg: "your_boyfriend_2.jpg",
                rightTitle: "The \"Extremely Fine\" Premium",
                rightPrice: "$5,000,000.00"
            },
            2: {
                title: "The Premium Collection: Egg 2 Setup",
                leftImg: "your_boyfriend_3.jpg", // Change to your separate images for page 2
                leftTitle: "The \"Flawless Masterpiece\" Deluxe",
                leftPrice: "Priceless",
                rightImg: "your_boyfriend_4.jpg", // Change to your separate images for page 2
                rightTitle: "The \"Rare Specimen\" Edition",
                rightPrice: "Infinite"
            }
        };

        function switchEgg(eggNumber, element) {
            // Update active style on buttons
            document.querySelectorAll('.egg-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // Get selected data
            const data = eggData[eggNumber];

            // Smoothly swap the content keeping layout perfectly identical
            document.getElementById('collection-title').innerText = data.title;
            
            document.getElementById('img-left').src = data.leftImg;
            document.getElementById('title-left').innerText = data.leftTitle;
            document.getElementById('price-left').innerText = data.leftPrice;

            document.getElementById('img-right').src = data.rightImg;
            document.getElementById('title-right').innerText = data.rightTitle;
            document.getElementById('price-right').innerText = data.rightPrice;
        }
    </script>

</body>
</html>
